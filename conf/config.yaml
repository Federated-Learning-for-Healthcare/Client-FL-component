# Healthcare FL Client — default single-federation config
# For multi-federation deployment use conf/federations/*.yaml instead

model:
  type: kan # options: kan | mlp
  params:
    layers_hidden: [784, 24, 24, 10] # MNIST default
    # Cleveland EHR:  [13, 32, 16, 2]
    # MIT-BIH ECG:    [187, 64, 32, 5]
    grid_min: -2.0
    grid_max: 2.0
    num_grids: 8
    use_base_update: true

data:
  type: mnist # options: mnist | ehr | ecg
  params:
    batch_size: 32
    shuffle: true
    data_root: "./data"

trainer:
  type: standard
  params:
    optimizer: adam # options: adam | sgd
    lr: 0.001
    momentum: 0.9

privacy:
  type: none # options: none | gaussian | dpsgd
  params:
    noise_multiplier: 1.0
    clipping_norm: 1.0

compression:
  type: none # options: none | topk | quantize
  params:
    top_k_ratio: 0.1
    bits: 16

runtime:
  device: cpu
  server_address: "127.0.0.1:8080"
  client_name: "hospital_client_01"
  log_level: "info"
