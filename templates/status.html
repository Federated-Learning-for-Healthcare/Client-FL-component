{% extends "base.html" %} {% block content %}

<div class="page-header">
  <div>
    <h2>{{ title }}</h2>
    <div
      style="
        font-size: 0.82rem;
        color: var(--color-text-secondary);
        margin-top: 2px;
      "
    >
      <a href="/" style="color: var(--color-text-secondary)">Dashboard</a>
      &rsaquo; {{ federation_id }}
    </div>
  </div>
  <div style="display: flex; gap: 0.5rem">
    <button class="btn btn-primary" onclick="startTraining()">Start</button>
    <button class="btn btn-danger" onclick="stopTraining()">Stop</button>
  </div>
</div>

<div
  style="
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 1rem;
    margin-bottom: 1.25rem;
  "
>
  <div class="stat-card">
    <div class="stat-label">State</div>
    <div class="stat-value" id="state-val">—</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Global round</div>
    <div class="stat-value" id="global-round-val">—</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Train accuracy</div>
    <div class="stat-value" id="train-acc-val">—</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Eval accuracy</div>
    <div class="stat-value" id="eval-acc-val">—</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Compression</div>
    <div class="stat-value" id="compression-val">—</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Update size</div>
    <div class="stat-value" id="bytes-val">—</div>
  </div>
</div>

<div
  id="message-bar"
  style="
    padding: 0.6rem 1rem;
    border-radius: 6px;
    margin-bottom: 1.25rem;
    font-size: 0.88rem;
    background: var(--color-background-secondary);
    color: var(--color-text-secondary);
    border-left: 3px solid var(--color-border-tertiary);
  "
>
  Waiting...
</div>

<div class="card" style="margin-bottom: 1.25rem">
  <div class="card-header">Loss over rounds</div>
  <div style="padding: 1rem; position: relative; height: 240px">
    <canvas id="loss-chart"></canvas>
  </div>
</div>

<div class="card">
  <div class="card-header">Accuracy over rounds</div>
  <div style="padding: 1rem; position: relative; height: 240px">
    <canvas id="acc-chart"></canvas>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script>
  const FED_ID = "{{ federation_id }}";
  const stateColors = {
    IDLE: "#9ca3af",
    CONNECTING: "#f59e0b",
    TRAINING: "#3b82f6",
    FINISHED: "#10b981",
    ERROR: "#ef4444",
  };

  function makeChart(id, color) {
    return new Chart(document.getElementById(id).getContext("2d"), {
      type: "line",
      data: {
        labels: [],
        datasets: [
          {
            label: "Train",
            data: [],
            borderColor: color,
            backgroundColor: color + "22",
            tension: 0.3,
            fill: true,
            pointRadius: 3,
          },
          {
            label: "Eval",
            data: [],
            borderColor: "#f59e0b",
            backgroundColor: "#f59e0b22",
            tension: 0.3,
            fill: false,
            pointRadius: 3,
            borderDash: [5, 3],
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { position: "top" } },
        scales: { y: { beginAtZero: false } },
      },
    });
  }

  const lossChart = makeChart("loss-chart", "#3b82f6");
  const accChart = makeChart("acc-chart", "#10b981");

  function updateChart(chart, trainHist, evalHist, tf, ef) {
    const em = {};
    (evalHist || []).forEach((e) => {
      em[e.client_round] = e;
    });
    chart.data.labels = trainHist.map((h) => `R${h.client_round}`);
    chart.data.datasets[0].data = trainHist.map((h) =>
      h[tf] != null ? +h[tf] : null,
    );
    chart.data.datasets[1].data = trainHist.map((h) => {
      const ev = em[h.client_round];
      return ev && ev[ef] != null ? +ev[ef] : null;
    });
    chart.update("none");
  }

  function fmtBytes(b) {
    if (b == null) return "—";
    if (b < 1024) return b + " B";
    if (b < 1048576) return (b / 1024).toFixed(1) + " KB";
    return (b / 1048576).toFixed(2) + " MB";
  }

  async function loadStatus() {
    try {
      const st = await (await fetch(`/federations/${FED_ID}/status`)).json();
      const sv = document.getElementById("state-val");
      sv.textContent = st.state || "—";
      sv.style.color = stateColors[st.state] || "#555";
      document.getElementById("global-round-val").textContent =
        st.global_round ?? "—";
      document.getElementById("train-acc-val").textContent =
        st.train_accuracy != null
          ? (st.train_accuracy * 100).toFixed(2) + "%"
          : "—";
      document.getElementById("eval-acc-val").textContent =
        st.eval_accuracy != null
          ? (st.eval_accuracy * 100).toFixed(2) + "%"
          : "—";
      document.getElementById("compression-val").textContent =
        st.compression_ratio != null
          ? st.compression_ratio.toFixed(2) + "x"
          : "—";
      document.getElementById("bytes-val").textContent = fmtBytes(
        st.update_size_bytes,
      );
      const bar = document.getElementById("message-bar");
      bar.textContent = st.message || "—";
      bar.style.borderLeftColor = stateColors[st.state] || "#ccc";
      if ((st.train_history || []).length > 0)
        (updateChart(
          lossChart,
          st.train_history,
          st.eval_history,
          "train_loss",
          "eval_loss",
        ),
          updateChart(
            accChart,
            st.train_history,
            st.eval_history,
            "train_accuracy",
            "eval_accuracy",
          ));
    } catch (e) {
      document.getElementById("message-bar").textContent =
        "Error: " + e.message;
    }
  }

  async function startTraining() {
    const d = await (
      await fetch(`/federations/${FED_ID}/start`, { method: "POST" })
    ).json();
    document.getElementById("message-bar").textContent = d.message;
  }
  async function stopTraining() {
    const d = await (
      await fetch(`/federations/${FED_ID}/stop`, { method: "POST" })
    ).json();
    document.getElementById("message-bar").textContent = d.message;
  }

  loadStatus();
  setInterval(loadStatus, 2000);
</script>
{% endblock %}
